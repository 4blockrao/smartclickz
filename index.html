    <!-- Enhanced Service Worker Registration -->
    <script>
      // A prior cache-first service worker served stale JS chunks after deploys
      // (causing "Importing a module script failed"). Do NOT register a SW.
      // Instead, unregister any lingering one, clear its caches, and reload once
      // so the page loads fresh from the network.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          if (!regs.length) return;
          Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
            if (window.caches) {
              caches.keys().then(function (keys) {
                keys.forEach(function (k) { caches.delete(k); });
              });
            }
            if (!sessionStorage.getItem('sw-cleaned')) {
              sessionStorage.setItem('sw-cleaned', '1');
              window.location.reload();
            }
          });
        });
      }

      // Install prompt handling
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('beforeinstallprompt fired');
        e.preventDefault();
        deferredPrompt = e;
      });

      // Track install
      window.addEventListener('appinstalled', (evt) => {
        console.log('App installed successfully');
      });
    </script>
